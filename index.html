<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Présences Football</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Agenda des présences</h1>
    <p>Test V1 — entraînements les lundis et mercredis</p>
  </header>

  <main>
    <section class="controls">
      <button id="prevMonth">← Mois précédent</button>
      <h2 id="monthTitle"></h2>
      <button id="nextMonth">Mois suivant →</button>
    </section>

    <section class="legend">
      <span class="dot training"></span> Entraînement
      <span class="dot present"></span> Présent
      <span class="dot absent"></span> Absent
    </section>

    <section id="calendar" class="calendar"></section>

    <section class="results">
      <h2>Résultats du jour sélectionné</h2>
      <p id="selectedDateLabel">Clique sur un jour d'entraînement.</p>
      <div class="result-actions">
        <button id="exportDayBtn" disabled>Exporter ce jour en CSV</button>
        <button id="exportAllBtn">Exporter tous les résultats en CSV</button>
        <button id="clearDataBtn" class="danger">Effacer les données</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Joueur</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </section>
  </main>

  <div id="confirmModal" class="modal hidden">
    <div class="modal-card">
      <h2>Confirmer le joueur</h2>
      <p>Tu as sélectionné : <strong id="confirmPlayerName"></strong></p>
      <div class="modal-actions">
        <button id="validatePlayerBtn">Valider</button>
        <button id="changePlayerBtn" class="secondary">Changer</button>
      </div>
    </div>
  </div>

  <div id="statusModal" class="modal hidden">
    <div class="modal-card">
      <h2>Présence</h2>
      <p id="statusText"></p>
      <div class="status-actions">
        <button id="presentBtn" class="present-btn">Présent</button>
        <button id="absentBtn" class="absent-btn">Absent</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
